# SUPERCAPFREEZER runtime configuration

serial:
  # Use /dev/serial0 for Raspberry Pi UART (Pi 3/4/5).
  # Set to null for USB auto-detection (/dev/ttyACM* or /dev/ttyUSB*).
  port: /dev/serial0
  baud: 57600

arduino_temp:
  enabled: true
  # Set to null for Arduino USB auto-detection.
  port: null
  baud: 9600
  decimals: 2
  send_interval_s: 0.5
  setpoint_celsius: null

trigger:
  # Automatic test trigger from incoming STM32 temperature.
  # Set to null to disable auto trigger.
  temperature_celsius: null
  direction: below   # below | above
  command: CHARGE
  once: true

logging:
  enabled: true
  directory: ./logs
  retention_hours: 24
  flush_interval_s: 1
