# SUPERCAPFREEZER runtime configuration

serial:
  # Set to null for auto-detection (/dev/ttyACM* or /dev/ttyUSB*)
  port: /dev/serial0
  baud: 57600

trigger:
  # Automatic test trigger from incoming STM32 temperature.
  # Set to null to disable auto trigger.
  temperature_celsius: -1.0
  direction: below   # below | above
  command: CHARGE
  once: true

logging:
  enabled: true
  directory: ./logs
  retention_hours: 24
  flush_interval_s: 1
